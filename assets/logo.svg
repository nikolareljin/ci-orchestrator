<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0f172a"/>

  <!-- Orchestrator node (top centre) -->
  <circle cx="50" cy="20" r="7" fill="#e2e8f0"/>

  <!-- Conductor arcs from orchestrator to each stage -->
  <path d="M 44 22 Q 28 34 26 42" stroke="#475569" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>
  <path d="M 50 27 L 50 38"         stroke="#475569" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>
  <path d="M 56 22 Q 72 34 74 42"  stroke="#475569" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>

  <!-- Build stage (left) -->
  <circle cx="26" cy="50" r="9" fill="#3b82f6"/>
  <!-- gear teeth on build node, simplified as a ring -->
  <circle cx="26" cy="50" r="9" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- Test stage (centre) -->
  <circle cx="50" cy="50" r="9" fill="#10b981"/>
  <!-- checkmark inside test node -->
  <polyline points="45,50 48,53 55,46" stroke="#d1fae5" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Deploy stage (right) -->
  <circle cx="74" cy="50" r="9" fill="#f59e0b"/>
  <!-- rocket fin shape inside deploy node -->
  <polygon points="74,44 78,53 74,51 70,53" fill="#fef3c7"/>

  <!-- Flow arrows between stages -->
  <line x1="35" y1="50" x2="40" y2="50" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="40,47.5 44,50 40,52.5" fill="#64748b"/>

  <line x1="59" y1="50" x2="64" y2="50" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="64,47.5 68,50 64,52.5" fill="#64748b"/>

  <!-- Stage labels -->
  <text x="26" y="67" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#94a3b8">BUILD</text>
  <text x="50" y="67" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#94a3b8">TEST</text>
  <text x="74" y="67" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#94a3b8">DEPLOY</text>

  <!-- Bottom label -->
  <text x="50" y="83" text-anchor="middle" font-family="monospace" font-size="6" font-weight="bold" fill="#cbd5e1" letter-spacing="1">ci-orchestrator</text>
</svg>
