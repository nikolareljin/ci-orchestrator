# ci-orchestrator C++ standard branching matrix
# Matching rules are selected by priority; higher numbers take precedence.
# File order does not control evaluation.

branch_patterns:
  feature: "^feature/"
  develop: "^develop$"
  release: "^release/"
  master:  "^(master|main)$"

rules:
  # ---- feature/* + open PR → lint + test ----

  - id: "cpp-feature-open-pr"
    src_branch: "feature"
    dst_branch: null
    event: "opened"
    tasks: [lint, test]
    priority: 100

  - id: "cpp-feature-sync-pr"
    src_branch: "feature"
    dst_branch: null
    event: "synchronize"
    tasks: [lint, test]
    priority: 99

  # ---- develop + push → lint + test + build ----

  - id: "cpp-develop-push"
    src_branch: "develop"
    dst_branch: "develop"
    event: "push"
    tasks: [lint, test, build]
    priority: 90

  - id: "cpp-develop-merged"
    src_branch: null
    dst_branch: "develop"
    event: "closed"
    merged: true
    tasks: [lint, test, build]
    priority: 89

  # ---- release/* merged PR to main/master → lint + test + build ----

  - id: "cpp-release-master-merged-pr"
    src_branch: "release"
    dst_branch: "master"
    event: "closed"
    merged: true
    tasks: [lint, test, build]
    priority: 80

  - id: "cpp-release-master-open-pr"
    src_branch: "release"
    dst_branch: "master"
    event: "opened"
    tasks: [lint, test]
    priority: 79

  # ---- main/master + push → lint + test + build + deploy ----

  - id: "cpp-master-push"
    src_branch: "master"
    dst_branch: "master"
    event: "push"
    tasks: [lint, test, build, deploy]
    priority: 70

  - id: "cpp-main-push"
    src_branch: null
    dst_branch: "master"
    event: "push"
    tasks: [lint, test, build, deploy]
    priority: 69
